quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/booking_db


quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file


quarkus.http.port=8080

quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{1.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."io.quarkus".level=DEBUG
quarkus.log.category."org.hibernate".level=DEBUG

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.info.title=Booking API
quarkus.smallrye-openapi.info.version=1.0.0

quarkus.smallrye-openapi.info.description=API for managing bookings
quarkus.smallrye-openapi.info.contact.name=John Doe

# JWT Configuration
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=your-issuer
smallrye.jwt.sign.key-location=privateKey_pkcs8.pem
smallrye.jwt.issuer=your-issuer
smallrye.jwt.expiration=3600
smallrye.jwt.refresh-expiration=604800

# ========================================
# BASE PATH (tanpa trailing slash)
# ========================================
quarkus.rest.path=/api/v1

# ========================================
# DEFAULT: Semua endpoint BUTUH autentikasi
# ========================================
quarkus.http.auth.permission.default.paths=/api/v1/*
quarkus.http.auth.permission.default.policy=authenticated
quarkus.http.auth.permission.default.auth-mechanism=bearer

# ========================================
# EXCLUDE: Endpoint publik (tanpa token)
# ========================================
quarkus.http.auth.permission.public.paths=/api/v1/auth/login,/api/v1/auth/register,/api/v1/auth/refresh,/api/v1/auth/check-email,/api/v1/public/*
quarkus.http.auth.permission.public.policy=permit

# ========================================
# OPTIONAL: Endpoint auth yang perlu token
# ========================================
quarkus.http.auth.permission.auth-secured.paths=/api/v1/auth/validate,/api/v1/auth/logout,/api/v1/auth/me
quarkus.http.auth.permission.auth-secured.policy=authenticated
quarkus.http.auth.permission.auth-secured.auth-mechanism=bearer

quarkus.security.jaxrs.deny-unannotated-endpoints=true